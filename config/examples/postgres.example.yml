# PostgreSQL source template for Spine.
#
# Usage:
#   1. Copy into your local tree, e.g. `cp config/examples/postgres.example.yml config/sources/my_pg_source.yml`
#   2. Set PG_HOST, PG_USER, PG_PASSWORD, PG_DATABASE (e.g. in the repo-root `.env` or the process environment).
#   3. Rename `resources` keys and adjust `database_schema` / `database_table` to match your tables.
#   4. Set `enabled: true` on the source (and resources) when you are ready to run.
#
# SAP HANA uses the same layout with `type: hana`; Spark loads the SAP ngdbc JDBC driver via packages.
# JDBC companion incremental extract (optional): see docs/configuration/database-incremental.md
# for correlation (join_columns vs join_predicate vs inference) and watermark.cursor rules.
enabled: false
type: postgresql
host: ${PG_HOST:-localhost}
port: 5432
username: ${PG_USER}
password: ${PG_PASSWORD}
database: ${PG_DATABASE}
# Optional driver extras (SSL, timeouts, etc.) — see SQLAlchemy / driver docs.
connection_params: {}

resources:
  # Full-table style: omit `fields` to include every column returned by the extract (all cast to string),
  # same idea as REST resources without a field list. Prefer an explicit `fields` block when you need
  # a subset of columns, stable renames (`name` vs `source`), or a documented output contract.
  users_full:
    method: GET
    database_schema: public
    database_table: users
  users:
    method: GET
    database_schema: public
    database_table: users
    # Optional: read via custom SQL instead of a full-table scan (schema/table still used for metadata/logging).
    # database_select_query: "SELECT id, name FROM public.users WHERE active = true"
    # Optional main-table filter when NOT using database_select_query (boolean SQL; use m. for main columns):
    # database_where_predicate: "m.active = true"
    #
    # Optional Spark JDBC read tuning (see docs/configuration/overview.md; honored for postgresql in this repo):
    # table_read_options:
    #   fetch_size: 5000
    #   # Range partitioning — supply bounds explicitly; partition_column must suit Spark's partitioner:
    #   # partition_column: id
    #   # lower_bound: 1
    #   # upper_bound: 1000000
    #   # num_partitions: 8
    #   # Or use predicates instead of partition_column (mutually exclusive):
    #   # predicates: ["id < 500000", "id >= 500000"]
    fields:
      - name: id
        source: id
      - name: name
        source: name
    # Omit per-resource `loading` to inherit defaults from `config/defaults.yml` (prefix becomes
    # `{source_name}/{resource_name}` at runtime). Use `loading: { enabled: false }` to skip writes.
