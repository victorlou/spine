name: CI

on:
  push:
    branches: [dev, main]
    tags: ["v*"]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ref: https://github.com/astral-sh/setup-uv/tags
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Black
        run: uv run black --check --diff src/ tests/

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Yamllint
        run: uv run yamllint config/defaults.example.yml config/examples/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Pytest
        run: >-
          uv run pytest
          --cov=src
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85

  change-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      docker-impacting: ${{ steps.filter.outputs.docker-impacting }}
    steps:
      - uses: actions/checkout@v4

      # Tradeoff: path-gating saves CI minutes by avoiding Docker work for docs/config-only PRs,
      # but it is intentionally simpler than proving every indirect Docker build input.
      - name: Detect Docker-impacting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docker-impacting:
              - 'docker/**'
              - 'requirements*.txt'
              - 'src/**'

  build:
    needs: [lint, test, change-diff]
    if: github.event_name == 'pull_request' && needs.change-diff.outputs.docker-impacting == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 'Setup yq'
        uses: dcarbone/install-yq-action@v1
        with:
          version: "v4.44.3"

      - name: Load configuration files
        run: |
          cp config/defaults.example.yml config/defaults.yml
          mkdir -p config/sources
          cp config/examples/jsonplaceholder.yml config/sources/jsonplaceholder.yml
          yq e -i '.enabled = true' config/sources/jsonplaceholder.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: spine:latest

      - name: Export image as artifact
        run: docker save spine:latest | gzip > spine.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: spine-image
          path: spine.tar.gz
          retention-days: 1

  docker-smoke:
    needs: [build, change-diff]
    if: github.event_name == 'pull_request' && needs.change-diff.outputs.docker-impacting == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: spine-image

      - name: Load image
        run: docker load --input spine.tar.gz

      - name: Run smoke test
        timeout-minutes: 2
        run: docker run --rm spine:latest --show-plan


  dev-image-smoke:
    needs: [lint, test]
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main' &&
      github.head_ref == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Setup yq'
        uses: dcarbone/install-yq-action@v1
        with:
          version: "v4.44.3"

      - name: Prepare example config
        run: |
          mkdir -p .ci/smoke-config/sources
          cp config/defaults.example.yml .ci/smoke-config/defaults.yml
          cp config/examples/jsonplaceholder.yml .ci/smoke-config/sources/jsonplaceholder.yml
          yq e -i '.enabled = true' .ci/smoke-config/sources/jsonplaceholder.yml

      - name: Pull dev image
        run: docker pull ${{ steps.image.outputs.name }}:dev

      - name: Run dev image smoke test
        timeout-minutes: 2
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/.ci/smoke-config:/config:ro" \
            "${{ steps.image.outputs.name }}:dev" \
            --show-plan

  build-and-push:
    needs: [lint, test]
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=dev-,format=short,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
