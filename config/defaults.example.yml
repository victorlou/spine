version: "1.0"

defaults:
  retry:
    max_attempts: 3
    initial_delay: 1
    backoff_factor: 2

  # Default is false, when true, run Spark df.count() for exact row totals in logs and summaries (full scan).
  log_full_row_count: false

  # Default loading: local Delta; relative storage_root resolves under the repository
  #   root (dir containing src/), e.g. repo/.spine/local-output (gitignored).
  # Override per resource if needed, or replace this block with S3 (see commented example below).
  loading:
    destination: "local"
    format: "delta"
    write_mode: "overwrite"
    compression: "snappy"
    storage_root: ".spine/local-output"
    # Omit prefix to write under ``{source_name}/{resource_name}`` (set at runtime).
    # Optional: coalesce before Delta/Iceberg append/overwrite only (see docs/configuration/loading.md).
    # output_partitions: 1

  # For Amazon S3 instead, use something like:
  # (Variable names below are operator-defined examples, not Spine-reserved env vars.)
  # loading:
  #   destination: "s3"
  #   format: "delta"
  #   write_mode: "overwrite"
  #   compression: "snappy"
  #   s3_bucket: "${S3_INGESTION_BUCKET}"  # canonical
  #   # bucket: "${S3_INGESTION_BUCKET}"   # alias
  #   prefix: "my_source/my_resource"
  #
  # For GCS instead:
  # (Use any env var name your team prefers; it only needs to match `${...}` references.)
  # loading:
  #   destination: "gcs"
  #   format: "delta"
  #   write_mode: "overwrite"
  #   compression: "snappy"
  #   gcs_bucket: "${GCS_INGESTION_BUCKET}"  # canonical
  #   # bucket: "${GCS_INGESTION_BUCKET}"    # alias
  #   prefix: "my_source/my_resource"
  #
  # For Azure Blob Storage (ABFS) instead:
  # loading:
  #   destination: "blob"  # preferred (aliases: azure, azure_blob)
  #   format: "delta"
  #   write_mode: "overwrite"
  #   compression: "snappy"
  #   azure_container: "${AZURE_CONTAINER}"  # canonical
  #   azure_account: "${AZURE_STORAGE_ACCOUNT}"
  #   # bucket: "${AZURE_CONTAINER}"         # alias for azure_container
  #   prefix: "my_source/my_resource"
  #
  # If a resource sets only cloud bucket/container + prefix, set destination on that resource (or here
  # in defaults) so it does not inherit destination: local from defaults.

  context:
    type: "redis"
    ttl: 3600
    prefix: "pipeline:"
    redis:
      host: "${REDIS_HOST:-localhost}"
      port: "${REDIS_PORT:-6379}"
      db: "${REDIS_DB:-0}"
      password: "${REDIS_PASSWORD:-}"
      ssl: "${REDIS_SSL:-false}"
      socket_timeout: 5
      socket_connect_timeout: 5
      retry_on_timeout: true
      max_connections: 10

  streaming:
    enable_streaming: true
    mode: "disk"
    flush_threshold: 20
    disk_config:
      path: "../.tmp/disk_streaming"
      file_size_threshold: 10000000

  # Spark host profile and symmetric Hadoop cloud connector provisioning (optional; sensible defaults apply).
  # ``profile: auto`` inspects the environment (Databricks, EMR, ECS ...) and picks local vs managed assumptions.
  # ``s3_connector_mode`` / ``gcs_connector_mode`` / ``azure_connector_mode``: auto | packages | external
  #   (``auto`` uses ``external`` on Databricks/EMR only; S3A endpoint region follows AWS env/credentials, not YAML).
  # spark_runtime:
  #   profile: "auto"
  #   s3_connector_mode: "auto"
  #   gcs_connector_mode: "auto"
  #   azure_connector_mode: "auto"
  # GCS auth defaults to APPLICATION_DEFAULT (ADC/service-account/workload identity).
  # Set SPINE_GCS_AUTH_TYPE=COMPUTE_ENGINE only when you intentionally require metadata auth.

# Named SQL files live under config/queries/ (operator-local, not committed).
# See config/examples/sample_query.sql for a minimal template.
queries: []
# To enable file-backed queries, first create the SQL file under config/queries/, then
# add entries like:
#   - name: "example_query"
#     description: "An example SQL query loaded from a file."
#     file: "example_query.sql"
